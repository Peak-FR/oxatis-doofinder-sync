name: Oxatis → CSV Doofinder

on:
  schedule:
    - cron: '0 7 * * *' 
  workflow_dispatch:     

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dépendances
        run: pip install pandas aiohttp requests --quiet

      - name: Vérifier le code avant exécution
        run: |
          echo "=== Contenu de generate_csv.py ligne URL_CSV ==="
          grep "URL_CSV" generate_csv.py
          echo "=== Fin vérification ==="

      - name: Générer le CSV enrichi
        run: python generate_csv.py

      - name: Commit et push le CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add produits_avec_avis.csv
          git diff --staged --quiet || git commit -m "🔄 Update CSV $(date +'%Y-%m-%d %H:%M')"
          git push
